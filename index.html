<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zelten im Jura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #f5f0e8;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .hero {
      text-align: center;
      max-width: 600px;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 {
      font-size: 2.8rem;
      color: #2d5016;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 1.2rem;
      color: #6b7c3a;
      margin-bottom: 2rem;
      font-style: italic;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: #6b7c3a;
      margin: 1.5rem auto;
      border-radius: 2px;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #444;
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="emoji">&#9978;</div>
    <h1>Zelten im Jura</h1>
    <p class="subtitle">Natur. Stille. Abenteuer.</p>
    <div class="divider"></div>
    <p>Planung und Infos für unvergessliche Zeltabenteuer im Schweizer Jura.</p>
  </div>
  <footer>coming soon</footer>
</body>
</html>
